name: 每日天气推送

on:
  schedule:
    # 每天北京时间早上7:30推送（UTC 23:30 前一天）
    - cron: '30 23 * * *'
  workflow_dispatch:  # 支持手动触发测试

jobs:
  push-weather:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 发送天气推送
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          CITY: ${{ vars.CITY || '东莞' }}
          CUSTOM_TEXT: ${{ vars.CUSTOM_TEXT || '今天也要开心！' }}
          TOPIC: ${{ secrets.TOPIC }}
        run: python weather_push.py
